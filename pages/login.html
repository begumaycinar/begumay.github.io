<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/mainlayout.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Oswald:wght@200..700&family=Roboto:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <title>Giriş Yap</title>
</head>
<body>
    <div class="container">

        <header class="header" id="header-container">
            <script src="../js/loadHeader.js"></script>
        </header>

        <aside id="sidebar-container" class="sidebar-a">
          <script src="../js/loadSidebar.js"></script>
    </aside>

        <nav class="navbar-a" id="navbar">
    <script src="../js/loadNavbar.js"></script>
</nav>

    <div class="ana login">
        <div class="wrap">
            <form action="">
                <h1 class="baslik">Giriş Yap</h1>
                <div class="input-kutusu">
                    <input type="text" placeholder="Kullanıcı adı" required>
                </div>
                <div class="input-kutusu">
                    <input type="password" placeholder="Şifre" required>
                </div>

                <div class="remember-forgot">
                    <label for="">
                        <input type="checkbox">
                        Beni hatırla
                    </label>
                    <a href="">Şifreni mi unuttun?</a>
                </div>

                <button type="submit">Giriş yap</button>
                <div class="register-link">
                    <p>Hesabın mı yok? <a href="">Şimdi kayıt ol.</a></p>
                </div>
            </form>
        </div>
    </div>


    <footer id="footer-container" class="footer">
        <script src="../js/loadFooter.js"></script>
    </footer>


    
    <script type="text/javascript" src="../js/gozlukCikar.js" defer></script>
</body>
</html>
