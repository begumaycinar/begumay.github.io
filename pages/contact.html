<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/mainlayout.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/contact.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Oswald:wght@200..700&family=Roboto:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
    <title>İletişim</title>
</head>
<body>
    <div class="container">

        <header class="header" id="header-container">
            <script src="../js/loadHeader.js"></script>
        </header>

        <aside id="sidebar-container" class="sidebar-a">
          <script src="../js/loadSidebar.js"></script>
    </aside>

        <nav class="navbar-a" id="navbar">
    <script src="../js/loadNavbar.js"></script>
</nav>

<div class="ana iletisim">
    
    <div class="label-iletisim">
        <h1 class="baslik">Bizimle İletişin</h1>
        <p class="paragraf">
            Karşılaştığınız sorunları, sorularınızı veya geri bildirimlerinizi
            ileti kutusuna yazın ve size geri ulaşabilmemiz için iletişim bilgisi bırakın!
        </p>
        <div class="grup-1">
            <div>
                <label for="iletisim-ad">Ad</label>
                <input type="text" id="iletisim-ad" placeholder="Adınız" required>
            </div>

            <div>
                <label for="iletisim-soyad">Soyad</label>
                <input type="text" id="iletisim-soyad" placeholder="Soyadınız" required>
            </div>
        </div>

        <div class="grup-2">
            <div>
                <label for="iletisim-eposta">E-Güvecin</label>
                <input type="text" id="iletisim-eposta" placeholder="birileri@eposta.com">
            </div>

            <div>
                <label for="iletisim-tlfn">İple Bağlanmış Konserve Kutusu</label>
                <input type="text" id="iletisim-tlfn" placeholder="(isterseniz) herhangi bir iletişim adresi">
            </div>

            <div>
                <label for="iletisim-ileti">İleti</label>
                <input type="text" id="iletisim-ileti" placeholder="Elinizden de hiçbir iş gelmiyor maşallah...">
            </div>
        </div>
        <button id="gonder">Gönder</button>
    </div>

    <script src="../js/contact.js"></script>
</div>

    <footer id="footer-container" class="footer">
        <script src="../js/loadFooter.js"></script>
    </footer>

    </div>

    
    <script type="text/javascript" src="../js/gozlukCikar.js" defer></script>
</body>
</html>
